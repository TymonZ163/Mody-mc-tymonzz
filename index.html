<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Pliki do pobrania</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #12161c;
    --surface: #1b212b;
    --surface-hover: #212836;
    --border: #2a3240;
    --text: #e8ecf1;
    --muted: #8b96a5;
    --accent: #ffb454;
    --accent-dim: #4a3d24;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 20px;
  }

  .panel{
    width:100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  .panel-header{
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--border);
  }

  .panel-header h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 22px;
    letter-spacing: -0.01em;
  }

  .breadcrumb{
    margin-top: 8px;
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--muted);
  }
  .breadcrumb span{ color: var(--accent); }

  .file-list{
    display:flex;
    flex-direction:column;
  }

  .file-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s ease;
  }
  .file-row:last-child{ border-bottom:none; }
  .file-row:hover{ background: var(--surface-hover); }

  .file-icon{
    width:38px;
    height:38px;
    border-radius:8px;
    background: var(--accent-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    font-weight:600;
    color: var(--accent);
    flex-shrink:0;
    text-transform:uppercase;
  }

  .file-info{ flex:1; min-width:0; }

  .file-name{
    font-weight:600;
    font-size:14.5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .file-meta{
    margin-top:2px;
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color: var(--muted);
  }

  .download-btn{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:8px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family:'Inter', sans-serif;
    font-size: 13px;
    font-weight:500;
    text-decoration:none;
    cursor:pointer;
    transition: all 0.15s ease;
  }

  .download-btn:hover{
    background: var(--accent);
    border-color: var(--accent);
    color: #12161c;
  }

  .download-btn svg{ width:14px; height:14px; }

  .panel-footer{
    padding: 14px 28px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="panel">
  <div class="panel-header">
    <h1>Moje mody do Minecraft</h1>
    <div class="breadcrumb">Pliki do pobrania</div>
  </div>

  <div class="file-list">

    <div class="file-row">
      <div class="file-icon">JAR</div>
      <div class="file-info">
        <div class="file-name">Let's do beachparty</div>
        <div class="file-meta">23.2 MB · zmienione piosenki</div>
      </div>
      <a href="letsdo-beachparty-tymonzz3.jar" class="download-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
        Pobierz
      </a>
    </div>

    <div class="file-row">
      <div class="file-icon">JAR</div>
      <div class="file-info">
        <div class="file-name">Let's do furniture</div>
        <div class="file-meta">2.8 MB · zmieniony crafting blueprinta</div>
      </div>
      <a href="letsdo-furniture-forge-tymonzz-1.0.4.jar" class="download-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
        Pobierz
      </a>
    </div>

  </div>

  <div class="panel-footer">2 pliki · 26 MB łącznie</div>
</div>

</body>
</html>
